name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Scan secure examples
        run: ./bin/kube-shipguard scan examples/secure --format text --fail-on high

      - name: Scan with suppression config
        run: ./bin/kube-shipguard scan examples/unsafe --config .kube-shipguard.example.yaml --format text --fail-on none

      - name: Verify baseline round trip
        run: |
          ./bin/kube-shipguard baseline examples/unsafe --output /tmp/kube-shipguard-baseline.yaml
          ./bin/kube-shipguard scan examples/unsafe --baseline /tmp/kube-shipguard-baseline.yaml --format text --fail-on high

      - name: Verify diff-aware mode
        run: ./bin/kube-shipguard scan --changed-from HEAD~1 --format text --fail-on high

      - name: Generate unsafe SARIF
        run: ./bin/kube-shipguard scan examples/unsafe --format sarif --output kube-shipguard.sarif --fail-on none

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: kube-shipguard.sarif
