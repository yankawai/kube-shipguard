name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Scan secure examples
        run: ./bin/kube-shipguard scan examples/secure --format text --fail-on high

      - name: Generate unsafe SARIF
        run: ./bin/kube-shipguard scan examples/unsafe --format sarif --output kube-shipguard.sarif --fail-on none

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: kube-shipguard.sarif
