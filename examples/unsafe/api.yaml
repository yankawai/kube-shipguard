apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/acme/api:latest
          resources:
            requests:
              cpu: 50m
          securityContext:
            allowPrivilegeEscalation: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  DB_PASSWORD: not-for-real
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
data:
  token: ZHVtbXk=
---
apiVersion: v1
kind: Service
metadata:
  name: api-public
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
