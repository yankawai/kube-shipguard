name: Kube ShipGuard
description: Scan Kubernetes manifests for release-readiness risks and optionally publish SARIF.
author: yankawai

inputs:
  path:
    description: File or directory to scan.
    required: false
    default: .
  fail-on:
    description: Minimum severity that fails the workflow. One of none, low, medium, high.
    required: false
    default: high
  format:
    description: Output format. One of text, json, sarif.
    required: false
    default: sarif
  output:
    description: Output file path.
    required: false
    default: kube-shipguard.sarif

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"
        cache: true
    - name: Run Kube ShipGuard
      shell: bash
      run: |
        go run github.com/yankawai/kube-shipguard/cmd/kube-shipguard@main scan "${{ inputs.path }}" \
          --format "${{ inputs.format }}" \
          --output "${{ inputs.output }}" \
          --fail-on "${{ inputs.fail-on }}"
